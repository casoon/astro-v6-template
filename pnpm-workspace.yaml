packages:
  - "apps/*"
  - "shared"

allowBuilds:
  "@casoon/astro-post-audit": true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  # Astro v6 (stable)
  astro: ^6.4.2
  "@astrojs/check": ^0.9.9
  "@astrojs/cloudflare": ^13.6.0
  "@astrojs/mdx": ^6.0.1
  "@astrojs/rss": ^4.0.18
  "@astrojs/svelte": ^8.1.2
  "@axe-core/playwright": ^4.11.3
  "@casoon/astro-post-audit": ^0.4.2
  "@casoon/astro-structured-data": ^1.2.0
  "@casoon/astro-site-files": ^0.4.1
  "@casoon/astro-speed-measure": ^0.2.0

  # Tailwind v4
  tailwindcss: ^4.3.0
  "@tailwindcss/typography": ^0.5.19
  "@tailwindcss/vite": ^4.3.0
  tailwindcss-animate: ^1.0.7

  # Svelte 5
  svelte: ^5.56.0
  "@sveltejs/vite-plugin-svelte": ^6.2.4
  lucide-svelte: ^1.0.1

  # Core
  gray-matter: ^4.0.3
  rehype-slug: ^6.0.0
  remark-gfm: ^4.0.1
  unist-util-visit: ^5.1.0
  tsx: ^4.22.4
  typescript: ^6.0.3
  zod: ^4.4.3
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  satori: ^0.26.0
  "@resvg/resvg-js": ^2.6.2
  sharp: ^0.34.5

  # Deployment
  wrangler: ^4.95.0

  # Formatting & Linting (Biome only - no more ESLint/Prettier hybrid)
  "@biomejs/biome": ^2.4.16
  husky: ^9.1.7
  lint-staged: ^17.0.7

  # Fonts (reduced set)
  "@fontsource/inter": ^5.2.8
  "@fontsource/lora": ^5.2.8
  "@fontsource/fira-code": ^5.2.7
