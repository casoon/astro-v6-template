packages:
  - "apps/*"
  - "shared"

allowBuilds:
  "@casoon/astro-post-audit": true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  # Astro v7 (alpha) — EXPERIMENT: Vite 8
  astro: 7.0.0-alpha.1
  "@astrojs/check": ^0.9.9
  "@astrojs/cloudflare": 14.0.0-alpha.0
  "@astrojs/mdx": 6.0.0-alpha.0
  "@astrojs/rss": ^4.0.18
  "@astrojs/svelte": 9.0.0-alpha.0
  "@axe-core/playwright": ^4.11.3
  "@casoon/astro-post-audit": ^0.2.11
  "@casoon/astro-site-files": ^0.1.6
  "@casoon/astro-speed-measure": ^0.2.0

  # Tailwind v4
  tailwindcss: ^4.3.0
  "@tailwindcss/typography": ^0.5.19
  "@tailwindcss/vite": ^4.3.0
  tailwindcss-animate: ^1.0.7

  # Svelte 5
  svelte: ^5.55.9
  "@sveltejs/vite-plugin-svelte": ^6.2.4
  lucide-svelte: ^1.0.1

  # Core
  gray-matter: ^4.0.3
  tsx: ^4.22.3
  typescript: ^6.0.3
  zod: ^4.4.3
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  satori: ^0.26.0
  "@resvg/resvg-js": ^2.6.2
  sharp: ^0.34.5

  # Deployment
  wrangler: ^4.94.0

  # Formatting & Linting (Biome only - no more ESLint/Prettier hybrid)
  "@biomejs/biome": ^2.4.15
  husky: ^9.1.7
  lint-staged: ^17.0.5

  # Fonts (reduced set)
  "@fontsource/inter": ^5.2.8
  "@fontsource/lora": ^5.2.8
  "@fontsource/fira-code": ^5.2.7
